<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ANELYA — Қыз ұзату тойына шақыру</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:radial-gradient(125% 95% at 50% 32%,#7f1622 0%,#5d0e18 46%,#400a11 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
@keyframes shimmer{to{background-position:200% center}}
@keyframes tw{0%,100%{opacity:.2;transform:scale(.8) rotate(0deg)}50%{opacity:1;transform:scale(1.15) rotate(45deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pf-fall{from{transform:translateY(-14vh)}to{transform:translateY(116vh)}}
@keyframes pf-sway{0%,100%{transform:translateX(-16px) rotate(-25deg)}50%{transform:translateX(16px) rotate(25deg)}}
.btn:hover{background:#7a1320!important;color:#f6e6bf!important;box-shadow:0 12px 30px rgba(0,0,0,.4)!important;transform:translateY(-2px)}
.btn{transition:background .3s,color .3s,box-shadow .3s,transform .3s}
</style>
</head>
<body>

<div id="petals" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden"></div>

<div style="position:relative;z-index:1;text-align:center;padding:40px 24px;animation:fadeUp .9s ease both">

  <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px">
    <span style="height:1px;width:clamp(30px,8vw,60px);background:linear-gradient(90deg,transparent,rgba(201,162,76,.6))"></span>
    <span style="color:#c9a24c;font-size:13px;letter-spacing:.3em;animation:tw 3.6s ease-in-out infinite">✦</span>
    <span style="height:1px;width:clamp(30px,8vw,60px);background:linear-gradient(90deg,rgba(201,162,76,.6),transparent)"></span>
  </div>

  <h1 style="font-family:'Cinzel',serif;font-weight:600;font-size:clamp(44px,14vw,90px);letter-spacing:.26em;padding-left:.26em;line-height:1;background:linear-gradient(95deg,#e7cd86,#b5872f 30%,#f7e2a4 52%,#bb8c39 72%,#ecd28a);-webkit-background-clip:text;background-clip:text;color:transparent;background-size:220% auto;animation:shimmer 7.5s linear infinite;margin-bottom:10px">ANELYA</h1>

  <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(32px,9vw,56px);line-height:1;background:linear-gradient(95deg,#e7cd86,#c0922f 32%,#f7e2a4 54%,#bb8c39 74%,#ecd28a);-webkit-background-clip:text;background-clip:text;color:transparent;background-size:220% auto;animation:shimmer 8s linear infinite;margin-bottom:clamp(28px,6vw,44px)">Қыз ұзату</div>

  <div style="font-family:'Playfair Display',serif;color:rgba(236,210,138,.7);font-size:clamp(11px,2.8vw,14px);letter-spacing:.22em;margin-bottom:clamp(32px,7vw,52px)">06 ҚЫРКҮЙЕК 2026 • АЛМАТЫ</div>

  <div style="font-family:'Playfair Display',serif;font-style:italic;color:rgba(236,210,138,.9);font-size:clamp(14px,3.5vw,18px);margin-bottom:clamp(22px,5vw,32px)">Той иесін таңдаңыз:</div>

  <div style="display:flex;flex-direction:column;gap:14px;align-items:center">
    <a href="aigul.html" class="btn" style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;font-family:'Playfair Display',serif;padding:16px 48px;border:1.4px solid #c9a24c;border-radius:40px;background:rgba(251,247,236,.08);backdrop-filter:blur(4px);color:#ecd28a;box-shadow:0 8px 24px rgba(0,0,0,.3);min-width:220px">
      <span style="font-size:clamp(17px,4.5vw,22px);letter-spacing:.18em;font-weight:600">АЙГҮЛ</span>
      <span style="font-size:clamp(12px,3vw,14px);letter-spacing:.1em;opacity:.7">+7 771 675 9786</span>
    </a>
    <a href="marat.html" class="btn" style="display:inline-flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;font-family:'Playfair Display',serif;padding:16px 48px;border:1.4px solid #c9a24c;border-radius:40px;background:rgba(251,247,236,.08);backdrop-filter:blur(4px);color:#ecd28a;box-shadow:0 8px 24px rgba(0,0,0,.3);min-width:220px">
      <span style="font-size:clamp(17px,4.5vw,22px);letter-spacing:.18em;font-weight:600">МАРАТ</span>
      <span style="font-size:clamp(12px,3vw,14px);letter-spacing:.1em;opacity:.7">+7 777 111 9299</span>
    </a>
  </div>

  <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:clamp(32px,7vw,52px)">
    <span style="height:1px;width:clamp(30px,8vw,60px);background:linear-gradient(90deg,transparent,rgba(201,162,76,.4))"></span>
    <span style="color:rgba(201,162,76,.5);font-size:13px">✦</span>
    <span style="height:1px;width:clamp(30px,8vw,60px);background:linear-gradient(90deg,rgba(201,162,76,.4),transparent)"></span>
  </div>
</div>

<script>
(function(){
  var pc=document.getElementById('petals');
  var colors=['#7a1320','#9c2330','#5e0d15','#e7d6ad','#caa24c'];
  for(var i=0;i<16;i++){
    var o=document.createElement('div');
    var dur=9+Math.random()*9,delay=-Math.random()*dur,left=Math.random()*100,sz=8+Math.random()*12;
    o.style.cssText='position:absolute;top:0;left:'+left+'vw;will-change:transform;animation:pf-fall '+dur+'s linear '+delay+'s infinite';
    var inner=document.createElement('div');
    var c=colors[Math.floor(Math.random()*colors.length)];
    inner.style.cssText='width:'+sz+'px;height:'+(sz*0.72).toFixed(1)+'px;border-radius:0 100% 0 100%;background:radial-gradient(130% 130% at 30% 20%,rgba(255,255,255,.55),'+c+');opacity:'+(0.32+Math.random()*0.4).toFixed(2)+';animation:pf-sway '+(2.6+Math.random()*2.6).toFixed(2)+'s ease-in-out '+delay+'s infinite';
    o.appendChild(inner);pc.appendChild(o);
  }
})();
</script>
</body>
</html>
